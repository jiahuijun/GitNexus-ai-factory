# src/main/resources/application-smoke.yml
# smoke 测试用:连真实 GitNexus + 真实 LLM,不连 DB(用 H2 内存)
spring:
  datasource:
    url: jdbc:h2:mem:smoketest;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration
  # 排除 Spring AI MCP SSE 自动配置——GitNexus 使用 Streamable HTTP 协议,
  # 由 GitNexusMcpClientConfiguration 提供自定义 McpSyncClient bean。
  # OpenAI 自动配置保留——smoke 测试需要真实 LLM 调用。
  autoconfigure:
    exclude:
      - org.springframework.ai.mcp.client.autoconfigure.McpClientAutoConfiguration
      - org.springframework.ai.mcp.client.autoconfigure.McpToolCallbackAutoConfiguration
      - org.springframework.ai.mcp.client.autoconfigure.StdioTransportAutoConfiguration
      - org.springframework.ai.mcp.client.autoconfigure.SseHttpClientTransportAutoConfiguration
      - org.springframework.ai.mcp.client.autoconfigure.SseWebFluxTransportAutoConfiguration
  ai:
    openai:
      # DashScope OpenAI 兼容模式。Spring AI 会自动追加 /v1/chat/completions，
      # 所以 base-url 不能带 /v1（否则变成 /v1/v1/chat/completions）。
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: sk-f234c5a60453430d8edbbd2bd8d3d9fc
      chat:
        options:
          model: qwen3.6-35b-a3b
          temperature: 0.2

factory:
  clients:
    real:
      enabled: true

gitnexus:
  mcp:
    # GitNexus 监听 IPv6 [::1]，Java HttpClient 默认解析 localhost 为 IPv4 127.0.0.1 会导致连接失败
    url: http://[::1]:4747/api/mcp

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
