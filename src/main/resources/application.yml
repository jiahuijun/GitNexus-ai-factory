spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_factory?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root123
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  # 排除 Spring AI MCP SSE 自动配置——GitNexus 使用 Streamable HTTP 协议,
  # 由 GitNexusMcpClientConfiguration 提供自定义 McpSyncClient bean。
  autoconfigure:
    exclude:
      - org.springframework.ai.mcp.client.autoconfigure.McpClientAutoConfiguration
      - org.springframework.ai.mcp.client.autoconfigure.McpToolCallbackAutoConfiguration
      - org.springframework.ai.mcp.client.autoconfigure.StdioTransportAutoConfiguration
      - org.springframework.ai.mcp.client.autoconfigure.SseHttpClientTransportAutoConfiguration
      - org.springframework.ai.mcp.client.autoconfigure.SseWebFluxTransportAutoConfiguration
  # Spring AI OpenAI 配置
  ai:
    openai:
      # DashScope OpenAI 兼容模式。Spring AI 会自动追加 /v1/chat/completions，
      base-url: ${LLM_BASE_URL:your-base-url}
      api-key: ${LLM_API_KEY:your-api-key}
      chat:
        options:
          model: ${LLM_MODEL:your-model}
          temperature: 0.2

gitnexus:
  mcp:
    # GitNexus 监听 IPv6 [::1]，Java HttpClient 默认解析 localhost 为 IPv4 127.0.0.1 会导致连接失败
    url: ${GITNEXUS_MCP_URL:http://[::1]:4747/api/mcp}

factory:
  clients:
    real:
      enabled: true
  worker:
    repo-base-path: ${REPO_BASE_PATH:./repos}
    max-retries: ${MAX_RETRIES:3}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
